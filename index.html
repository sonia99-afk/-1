<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Конвертация рублей в юани</title>
</head>
<body>
  <main class="container">
    <h1>Митенева Софья P4108</h1>
    <p class="subtitle">Конвертация рублей в юани по текущему курсу ЦБ РФ</p>

    <form id="convert-form" class="form">
      <div class="form-row">
        <label for="surname">Фамилия</label>
        <input id="surname" type="text" placeholder="Введите фамилию" required />
      </div>

      <div class="form-row">
        <label for="rubles">Сумма в рублях</label>
        <input id="rubles" type="number" min="0" step="0.01" placeholder="Введите сумму" required />
      </div>

      <button type="submit">Конвертировать</button>
    </form>

    <div id="result" class="result">
      <p>Здесь появится результат конвертации.</p>
    </div>
  </main>

  <script>
    async function fetchCNYRate() {
      const response = await fetch("https://www.cbr-xml-daily.ru/daily_json.js");

      if (!response.ok) {
        throw new Error("Не удалось получить курс валют с сайта ЦБ РФ.");
      }

      const data = await response.json();
      const cny = data.Valute.CNY;

      return cny.Value / cny.Nominal;
    }

    const form = document.getElementById("convert-form");
    const resultEl = document.getElementById("result");

    form.addEventListener("submit", async (event) => {
      event.preventDefault();

      const surname = document.getElementById("surname").value.trim();
      const rubles = parseFloat(document.getElementById("rubles").value);

      if (!surname) {
        resultEl.classList.add("error");
        resultEl.innerHTML = "<p>Пожалуйста, введите фамилию.</p>";
        return;
      }

      if (!Number.isFinite(rubles) || rubles <= 0) {
        resultEl.classList.add("error");
        resultEl.innerHTML = "<p>Пожалуйста, введите корректную сумму в рублях.</p>";
        return;
      }

      resultEl.classList.remove("error");
      resultEl.innerHTML = "<p>Получаем текущий курс юаня с сайта ЦБ РФ...</p>";

      try {
        const rate = await fetchCNYRate();
        const yuan = rubles / rate;

        resultEl.innerHTML = `
          <p><strong>Фамилия:</strong> ${surname}</p>
          <p><strong>Сумма в рублях:</strong> ${rubles.toFixed(2)} ₽</p>
          <p><strong>Итог конвертации:</strong> ${yuan.toFixed(2)} ¥</p>
          <p><strong>Курс ЦБ РФ:</strong> 1 CNY = ${rate.toFixed(4)} ₽</p>
        `;
      } catch (error) {
        resultEl.classList.add("error");
        resultEl.innerHTML = `<p>Ошибка: ${error.message}</p>`;
      }
    });
  </script>
</body>
</html>
